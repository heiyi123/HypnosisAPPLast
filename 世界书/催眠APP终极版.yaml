  - 名称: "《催眠APP守则》"
    启用: true
    激活策略:
      类型: 绿灯
      关键字:
        - <催眠发送>
        - <意外催眠>
    插入位置:
      类型: 角色定义之前
      顺序: 10065
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    内容: |-
      所有催眠APP使用者需要遵守以下守则：
      1. 催眠APP不能被非持有者发现
      2. 催眠期间不能让被催眠者被其他人发现异常，尤其是其亲人朋友
      3. 催眠结束后必须善后，清理痕迹，避免催眠结束后被催眠者察觉异常
      4. 催眠期间不能进行过于激进的行为给被催眠者造成不可逆的损失或者痕迹，必须在自己可控范围内催眠。

  - 名称: "[mvu_plot]轻量合理性审查"
    启用: true
    激活策略:
      类型: 绿灯
      关键字:
        - <催眠发送>
        - <意外催眠>
    插入位置:
      类型: 指定深度
      角色: 用户
      深度: 0
      顺序: 10001
    激活概率: 100
    递归:
      不可被其他条目激活: false
      不可激活其他条目: false
    内容: |-
      注意: 
      当你接收到<催眠发送>或<意外催眠>指令后，需立即中断当前主线剧情，开始按规则输出催眠剧情。
      无论前文、正文风格如何，催眠剧情必须详细、直白的描写色情场景，让内容尽可能色情。
      催眠剧情结束前，必须始终专注于催眠剧情的塑造。只有设定的催眠时间结束，才能结束催眠剧情。
      输出正文前阅读<status_current_variable_催眠APP>中的变量，确保正文中的内容和变量相符。

